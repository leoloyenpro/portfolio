<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#06070C">
<title>Projet — Léo Loyen</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06070C; --bg2:#0D0E14; --panel:#0D0E14;
  --line:#0D0F18; --line2:#161B2C;
  --text:#EAECF5; --muted:#8A92AB; --muted2:#4A5268;
  --cyan:#405FFA; --magenta:#09BBC8;
  --neon:linear-gradient(120deg,#405FFA,#3B3664);
  --neon-gold:linear-gradient(120deg,#09BBC8,#07A0AC);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Clash Display',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* GRID BG */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(circle at 50% 0%,#000 0%,transparent 85%);opacity:.4}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:18px 28px;backdrop-filter:blur(12px);background:rgba(6,7,12,.95);border-bottom:1px solid var(--line)}
.logo{font-family:'Clash Display';font-weight:700;font-size:17px;letter-spacing:.5px}
.btn-back{padding:9px 20px;border-radius:100px;border:1px solid var(--line2);color:var(--muted);font-family:'Clash Display';font-size:13px;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.btn-back:hover{border-color:var(--cyan);color:var(--cyan)}

/* HERO IMAGE */
.projet-hero{margin-top:70px;width:100%;aspect-ratio:16/7;background:var(--bg2);background-size:cover;background-position:center;position:relative}
.projet-hero::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 40%,var(--bg) 100%)}

/* CONTENU */
.projet-body{max-width:860px;margin:0 auto;padding:0 24px 100px}
.projet-meta{padding:48px 0 36px;border-bottom:1px solid var(--line)}
.projet-cat{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.cat-evenementiel{color:var(--magenta)}
.cat-archviz{color:var(--cyan)}
.projet-titre{font-family:'Clash Display';font-weight:700;font-size:clamp(32px,5vw,60px);letter-spacing:-.02em;line-height:1.04;margin-bottom:20px}
.projet-desc{color:var(--muted);font-size:18px;max-width:620px}
.projet-date{font-size:12px;color:var(--muted2);margin-top:14px;letter-spacing:.5px}

.projet-texte{padding:48px 0;color:var(--muted);font-size:16px;line-height:1.8;white-space:pre-wrap}

/* GALERIE IMAGES */
.projet-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:0 0 60px}
.projet-gallery img{width:100%;border-radius:12px;border:1px solid var(--line2);aspect-ratio:4/3;object-fit:cover;transition:.3s}
.projet-gallery img:hover{transform:scale(1.02);border-color:var(--line2)}
.projet-gallery .full-width{grid-column:1/-1;aspect-ratio:16/7}

/* LOADING */
#loading{min-height:60vh;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}
#not-found{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;display:none}
#not-found h2{font-size:24px;margin-bottom:12px}
#not-found p{color:var(--muted)}

@media(max-width:600px){.projet-gallery{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <div class="logo">Léo Loyen</div>
  <a href="index.html" class="btn-back">← Retour</a>
</nav>

<div id="loading">Chargement...</div>

<div id="not-found">
  <div>
    <h2>Projet introuvable</h2>
    <p>Ce projet n'existe pas ou a été supprimé.</p>
    <a href="index.html" style="color:var(--cyan);margin-top:20px;display:inline-block">← Retour au portfolio</a>
  </div>
</div>

<div id="projet-content" style="display:none">
  <div class="projet-hero" id="hero-img"></div>
  <div class="projet-body">
    <div class="projet-meta">
      <div class="projet-cat" id="p-cat"></div>
      <h1 class="projet-titre" id="p-titre"></h1>
      <p class="projet-desc" id="p-desc"></p>
      <p class="projet-date" id="p-date"></p>
    </div>
    <div class="projet-texte" id="p-texte"></div>
    <div class="projet-gallery" id="p-gallery"></div>
  </div>
</div>

<script>
async function loadProjet() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));

  try {
    const res = await fetch('/api/projets');
    const projets = await res.json();
    const projet = projets.find(p => p.id === id);

    document.getElementById('loading').style.display = 'none';

    if (!projet) {
      document.getElementById('not-found').style.display = 'flex';
      return;
    }

    // Remplir le contenu
    document.title = `${projet.titre} — Léo Loyen`;

    if (projet.image) {
      document.getElementById('hero-img').style.backgroundImage = `url('${projet.image}')`;
    }

    const catLabel = projet.categorie === 'evenementiel' ? 'Événementiel' : 'Archviz';
    document.getElementById('p-cat').textContent = catLabel;
    document.getElementById('p-cat').className = `projet-cat cat-${projet.categorie}`;
    document.getElementById('p-titre').textContent = projet.titre;
    document.getElementById('p-desc').textContent = projet.description || '';
    document.getElementById('p-texte').textContent = projet.texte || '';

    if (projet.date) {
      const d = new Date(projet.date);
      document.getElementById('p-date').textContent = d.toLocaleDateString('fr-FR', { year:'numeric', month:'long' });
    }

    // Galerie images supplémentaires
    if (projet.images && projet.images.length) {
      const gallery = document.getElementById('p-gallery');
      gallery.innerHTML = projet.images.map((src, i) =>
        `<img src="${src}" alt="Image ${i+1} — ${projet.titre}" ${i===0 ? 'class="full-width"' : ''} />`
      ).join('');
    }

    document.getElementById('projet-content').style.display = 'block';

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('not-found').style.display = 'flex';
  }
}

loadProjet();
</script>
</body>
</html>

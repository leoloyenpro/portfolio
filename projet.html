<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#06070C">
<title>Projet — Léo Loyen</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06070C; --bg2:#0D0E14; --panel:#0D0E14;
  --line:#0D0F18; --line2:#161B2C;
  --text:#EAECF5; --muted:#8A92AB; --muted2:#4A5268;
  --cyan:#405FFA; --magenta:#09BBC8;
  --neon:linear-gradient(120deg,#405FFA,#3B3664);
  --neon-gold:linear-gradient(120deg,#09BBC8,#07A0AC);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Clash Display',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* GRILLE DE FOND (z-index 0, derrière tout) */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(circle at 50% 0%,#000 0%,transparent 85%);opacity:.55;animation:gridpulse 8s ease-in-out infinite}
@keyframes gridpulse{0%,100%{opacity:.45}50%{opacity:.75}}

/* GLOW qui suit la souris (z-index 1, derrière le contenu) */
#cg{position:fixed;top:0;left:0;width:520px;height:520px;pointer-events:none;z-index:1;background:radial-gradient(circle,rgba(64,95,250,.18),rgba(9,187,200,.08) 40%,transparent 70%);will-change:transform}

/* Tout le contenu passe DEVANT (z-index 10) */
nav, .projet-body, #loading, #not-found{position:relative;z-index:10}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:18px 28px;backdrop-filter:blur(12px);background:rgba(6,7,12,.95);border-bottom:1px solid var(--line)}
.logo{font-family:'Clash Display';font-weight:700;font-size:17px;letter-spacing:.5px}
.btn-back{padding:9px 20px;border-radius:100px;border:1px solid var(--line2);color:var(--muted);font-family:'Clash Display';font-size:13px;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.btn-back:hover{border-color:var(--cyan);color:var(--cyan)}

/* CONTENU */
.projet-body{max-width:1100px;margin:0 auto;padding:0 24px 100px}
.projet-meta{padding:130px 0 40px;border-bottom:1px solid var(--line)}
.projet-cat{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.cat-evenementiel{color:var(--magenta)}
.cat-archviz{color:var(--cyan)}
.projet-titre{font-family:'Clash Display';font-weight:700;font-size:clamp(32px,5vw,60px);letter-spacing:-.02em;line-height:1.04;margin-bottom:20px}
.projet-desc{color:var(--muted);font-size:18px;max-width:620px}
.projet-meta-info{display:flex;gap:20px;margin-top:18px;flex-wrap:wrap;align-items:center}
.projet-date{font-size:12px;color:var(--muted2);letter-spacing:.5px}
.projet-tags{display:flex;gap:8px;flex-wrap:wrap}
.projet-tags span{font-size:11px;padding:5px 12px;border:1px solid var(--line2);border-radius:100px;color:var(--muted);letter-spacing:.5px}

.projet-texte{padding:48px 0;color:var(--muted);font-size:16px;line-height:1.8;white-space:pre-wrap;max-width:760px}

/* GALERIE IMAGES - 3 colonnes */
.projet-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:0 0 60px}
.projet-gallery img{width:100%;border-radius:12px;border:1px solid var(--line2);aspect-ratio:4/3;object-fit:cover;transition:.3s;cursor:pointer;display:block;background:var(--panel)}
.projet-gallery img:hover{transform:scale(1.02);border-color:var(--cyan);box-shadow:0 0 30px -8px rgba(64,95,250,.5)}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(6,7,12,.96);backdrop-filter:blur(10px);z-index:1000;display:none;align-items:center;justify-content:center;padding:40px;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:95%;max-height:95%;object-fit:contain;border-radius:8px;box-shadow:0 20px 80px -20px rgba(0,0,0,.9)}
.lightbox-close{position:fixed;top:24px;right:32px;width:44px;height:44px;border-radius:50%;border:1px solid var(--line2);background:rgba(6,7,12,.6);color:var(--text);font-size:22px;cursor:pointer;display:grid;place-items:center;transition:.2s;z-index:1001}
.lightbox-close:hover{border-color:var(--magenta);color:var(--magenta)}
.lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;border:1px solid var(--line2);background:rgba(6,7,12,.6);color:var(--text);font-size:24px;cursor:pointer;display:grid;place-items:center;transition:.2s;z-index:1001}
.lightbox-nav:hover{border-color:var(--cyan);color:var(--cyan)}
.lightbox-prev{left:32px}
.lightbox-next{right:32px}

/* LOADING */
#loading{min-height:60vh;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}
#not-found{min-height:70vh;flex-direction:column;align-items:center;justify-content:center;text-align:center;display:none}
#not-found h2{font-size:24px;margin-bottom:12px}
#not-found p{color:var(--muted)}

@media(max-width:800px){.projet-gallery{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.projet-gallery{grid-template-columns:1fr}.lightbox-nav{width:42px;height:42px;font-size:20px}.lightbox-prev{left:12px}.lightbox-next{right:12px}}
</style>
</head>
<body>

<div id="cg"></div>

<nav>
  <div class="logo">Léo Loyen</div>
  <a href="index.html" class="btn-back">← Retour</a>
</nav>

<div id="loading">Chargement...</div>

<div id="not-found">
  <h2>Projet introuvable</h2>
  <p>Ce projet n'existe pas ou a été supprimé.</p>
  <a href="index.html" style="color:var(--cyan);margin-top:20px;display:inline-block">← Retour au portfolio</a>
</div>

<div id="projet-content" style="display:none">
  <div class="projet-body">
    <div class="projet-meta">
      <div class="projet-cat" id="p-cat"></div>
      <h1 class="projet-titre" id="p-titre"></h1>
      <p class="projet-desc" id="p-desc"></p>
      <div class="projet-meta-info">
        <span class="projet-date" id="p-date"></span>
        <div class="projet-tags" id="p-tags"></div>
      </div>
    </div>
    <div class="projet-texte" id="p-texte"></div>
    <div class="projet-gallery" id="p-gallery"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox(event)">×</button>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(event,-1)">‹</button>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(event,1)">›</button>
</div>

<script>
// GLOW qui suit la souris
const cg = document.getElementById('cg');
if (cg && matchMedia('(pointer:fine)').matches) {
  let cx = innerWidth/2, cy = innerHeight/2, tx = cx, ty = cy;
  addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
  (function loop(){
    cx += (tx-cx)*.12; cy += (ty-cy)*.12;
    cg.style.transform = `translate(${cx}px,${cy}px) translate(-50%,-50%)`;
    requestAnimationFrame(loop);
  })();
} else if (cg) {
  cg.style.display = 'none';
}

let galleryImages = [];
let currentImg = 0;

async function loadProjet() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));

  try {
    const res = await fetch('/api/projets');
    const projets = await res.json();
    const projet = projets.find(p => p.id === id);

    document.getElementById('loading').style.display = 'none';

    if (!projet) {
      document.getElementById('not-found').style.display = 'flex';
      return;
    }

    document.title = `${projet.titre} — Léo Loyen`;

    const catLabel = projet.categorie === 'evenementiel' ? 'Événementiel' : 'Archviz';
    document.getElementById('p-cat').textContent = catLabel;
    document.getElementById('p-cat').className = `projet-cat cat-${projet.categorie}`;
    document.getElementById('p-titre').textContent = projet.titre;
    document.getElementById('p-desc').textContent = projet.description || '';
    document.getElementById('p-texte').textContent = projet.texte || '';

    // Date / année
    if (projet.annee) {
      document.getElementById('p-date').textContent = projet.annee;
    } else if (projet.date) {
      const d = new Date(projet.date);
      document.getElementById('p-date').textContent = d.toLocaleDateString('fr-FR', { year:'numeric', month:'long' });
    }

    // Tags
    const tags = (projet.tags || '').split(',').map(t=>t.trim()).filter(Boolean);
    if (tags.length) {
      document.getElementById('p-tags').innerHTML = tags.map(t=>`<span>${t}</span>`).join('');
    }

    // Galerie : uniquement les images supplémentaires (pas la miniature)
    galleryImages = [];
    if (projet.images && projet.images.length) galleryImages.push(...projet.images);

    const gallery = document.getElementById('p-gallery');
    gallery.innerHTML = galleryImages.map((src, i) =>
      `<img src="${src}" alt="Image ${i+1} — ${projet.titre}" onclick="openLightbox(${i})" loading="lazy" />`
    ).join('');

    document.getElementById('projet-content').style.display = 'block';

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('not-found').style.display = 'flex';
  }
}

// LIGHTBOX
function openLightbox(i) {
  currentImg = i;
  document.getElementById('lightbox-img').src = galleryImages[i];
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function navLightbox(e, dir) {
  e.stopPropagation();
  currentImg = (currentImg + dir + galleryImages.length) % galleryImages.length;
  document.getElementById('lightbox-img').src = galleryImages[currentImg];
}

// Fermer en cliquant sur le fond
document.getElementById('lightbox').addEventListener('click', () => closeLightbox());

// Navigation clavier
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(e, -1);
  if (e.key === 'ArrowRight') navLightbox(e, 1);
});

loadProjet();
</script>
</body>
</html>
